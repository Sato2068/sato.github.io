<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:    #0f0f0f;
      --paper:  #f7f5f0;
      --mid:    #6b6660;
      --accent: #2d6aff;
      --border: #dedad4;
      --card:   #ffffff;
      --error:  #ff4d4d;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.2rem;
      padding: 2.8rem 2.4rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 1.4rem;
      letter-spacing: -0.03em;
      margin-bottom: 0.3rem;
    }
    .logo span { color: var(--accent); }
    .subtitle {
      font-size: 0.85rem; color: var(--mid);
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
      color: var(--ink);
    }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 0.6rem;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--ink);
      background: var(--paper);
      outline: none;
      transition: border-color .2s;
      margin-bottom: 1.2rem;
    }
    input:focus { border-color: var(--accent); background: #fff; }
    .btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 0.6rem;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, transform .15s;
      margin-top: 0.4rem;
    }
    .btn:hover { background: var(--accent); transform: translateY(-1px); }
    .divider {
      display: flex; align-items: center; gap: 0.8rem;
      margin: 1.4rem 0; color: var(--mid); font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .footer-text {
      text-align: center; font-size: 0.82rem; color: var(--mid);
      margin-top: 1.4rem;
    }
    .footer-text a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .footer-text a:hover { text-decoration: underline; }
    .forgot {
      text-align: right; font-size: 0.78rem;
      margin-top: -0.8rem; margin-bottom: 1.2rem;
    }
    .forgot a { color: var(--mid); text-decoration: none; }
    .forgot a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">YourName<span>.</span></div>
    <p class="subtitle">アカウントにログインする</p>

    <label for="email">メールアドレス</label>
    <input type="email" id="email" placeholder="you@example.com">

    <label for="password">パスワード</label>
    <input type="password" id="password" placeholder="••••••••">

    <div class="forgot"><a href="#">パスワードを忘れた方</a></div>

    <button class="btn" onclick="handleLogin()">ログイン</button>

    <div class="divider">または</div>

    <div class="footer-text">
      アカウントをお持ちでない方は <a href="#">新規登録</a>
    </div>
  </div>

<script>
function handleLogin() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  if (!email || !password) {
    alert("メールアドレスとパスワードを入力してください");
    return;
  }
  // ログイン成功 → index.html へ遷移
  window.location.href = "index.html";
}
</script>
</body>
</html>
